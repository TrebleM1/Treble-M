<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treble M Motors | تصفح واستأجر سيارتك</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --text-main: #334155;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 0; }
        .navbar { background-color: var(--dark); color: white; padding: 25px 20px; text-align: center; box-shadow: var(--shadow); }
        .navbar h1 { margin: 0; font-size: 32px; font-weight: 900; }
        .navbar p { margin: 5px 0 0 0; font-size: 14px; color: #94a3b8; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .filter-section { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 20px; margin-bottom: 35px; box-shadow: var(--shadow); }
        .filter-title { font-weight: 700; margin-bottom: 15px; color: var(--dark); }
        .filter-grid { display: flex; flex-wrap: wrap; gap: 12px; }
        .filter-btn { background: #e2e8f0; color: var(--text-main); border: none; padding: 8px 18px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: 'Cairo', sans-serif; }
        .filter-btn.active { background: var(--primary); color: white; }

        .showcase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .car-card { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border-color); overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; transition: all 0.3s ease; }
        .car-card:hover { transform: translateY(-6px); }
        
        .car-image-container { width: 100%; height: 200px; background-color: #cbd5e1; position: relative; overflow: hidden; }
        .car-image-container img { width: 100%; height: 100%; object-fit: cover; }

        .status-tag { position: absolute; top: 15px; right: 15px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; }
        .status-available { background-color: var(--success); }
        .status-rented { background-color: var(--danger); }

        .car-content { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .car-name { font-size: 22px; font-weight: 700; color: var(--dark); margin: 0 0 10px 0; }
        .car-meta { font-size: 13px; color: #64748b; margin-bottom: 15px; font-weight: 600; }
        .cat-badge { display: inline-block; background: #eff6ff; color: #1e40af; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; margin-left: 5px; }

        .price-wrapper { background: #f8fafc; border-radius: var(--radius-md); padding: 15px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .price-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; color: #475569; }
        .price-value { font-weight: 700; color: #065f46; font-size: 14px; }

        .btn-action-rent { display: block; text-align: center; background: var(--primary); color: white; padding: 12px; border-radius: var(--radius-md); text-decoration: none; font-weight: 700; font-size: 15px; transition: background 0.2s; }
        .btn-action-rent:hover { background: var(--primary-hover); }
    </style>
</head>
<body>

<div class="navbar">
    <h1>Treble M Motors</h1>
    <p>اختر سيارتك المفضلة وانطلق برحلتك بكل راحة وأمان</p>
</div>

<div class="container">
    <div class="filter-section">
        <div class="filter-title">🔍 اختر الفئة لتصفية السيارات:</div>
        <div class="filter-grid">
            <button class="filter-btn active" onclick="filterCars('الكل', this)">الكل</button>
            <button class="filter-btn" onclick="filterCars('سياحية', this)">سياحية</button>
            <button class="filter-btn" onclick="filterCars('عائلية', this)">عائلية</button>
            <button class="filter-btn" onclick="filterCars('جيب', this)">جيب</button>
            <button class="filter-btn" onclick="filterCars('VIP', this)">VIP ⭐</button>
        </div>
    </div>

    <div class="showcase-grid" id="carsGrid">
        </div>
</div>

<script>
fetch('cars_status.json?v=' + Date.now())
    .then(response => response.json())
    .then(cars => {
        const grid = document.getElementById('carsGrid');
        grid.innerHTML = '';
        
        cars.forEach(car => {
            const isAvailable = car.status === 'متاحة' || car.status === 'متاح';
            const statusClass = isAvailable ? 'status-available' : 'status-rented';
            const statusText = isAvailable ? '🟢 متاحة حالياً' : '🔴 مؤجرة حالياً';
            
            // تجهيز نص الرسالة التلقائي للواتساب باحترافية
            const companyNumber = "963944532131"; // 👈 ضع رقم شركتك هنا بدون أصفار أو علامة زائد
            const messageText = `مرحباً Treble M Motors، أود الاستفسار عن حجز سيارة: (${car.name}) موديل (${car.model})، ذات اللون (${car.color}) المتاحة في موقعكم الإلكتروني.`;
            const whatsappUrl = `https://wa.me/${companyNumber}?text=${encodeURIComponent(messageText)}`;
            
            const carHtml = `
                <div class="car-card" data-category="${car.category}">
                    <div class="car-image-container">
                        <span class="status-tag ${statusClass}">${statusText}</span>
                        <img src="${car.image || 'default.jpg'}" onerror="this.src='default.jpg';" alt="${car.name}">
                    </div>
                    <div class="car-content">
                        <div>
                            <h2 class="car-name">${car.name}</h2>
                            <div class="car-meta">
                                <span>🗓️ الموديل: ${car.model}</span> | <span>🎨 اللون: ${car.color}</span>
                            </div>
                            <div style="margin-bottom: 15px;">
                                <span class="cat-badge">${car.category}</span>
                            </div>
                            <div class="price-wrapper">
                                <div class="price-row">
                                    <span>إيجار يومي:</span>
                                    <span class="price-value">$${car.daily_price}</span>
                                </div>
                            </div>
                        </div>
                        <div>
                            <a href="${whatsappUrl}" target="_blank" class="btn-action-rent">📱 استفسر واحجز عبر واتساب</a>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += carHtml;
        });
    }).catch(err => {
        document.getElementById('carsGrid').innerHTML = '<p style="text-align:center; width:100%;">جاري تحميل أسطول السيارات الفاخر...</p>';
    });

function filterCars(category, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cards = document.querySelectorAll('.car-card');
    cards.forEach(card => {
        if(category === 'الكل' || card.getAttribute('data-category') === category) {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });
}
</script>
</body>
</html>
